<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Sign in & Sign up Form</title>
  </head>
  <body>
    <div class="login_container">
      <div class="login_forms-container">
        <div class="login_signin-signup">
          <form action="#" class="login_sign-in-form">
            <h2 class="login_title">Login</h2>
            <div class="login_input-field">
              <i class="fas fa-user"></i>
              <input
                id="login_login-username"
                type="text"
                placeholder="Username"
                required
              />
            </div>
            <div class="login_input-field">
              <i class="fas fa-lock"></i>
              <input
                id="login_login-password"
                type="password"
                placeholder="Password"
                required
              />
            </div>
            <input type="submit" value="Login" class="login_btn login_solid" />
            <p class="login_social-text">Or Sign in with social platforms</p>
            <div class="login_social-media">
              <a href="#" class="login_social-icon">
                <i class="fab fa-google"></i>
              </a>
              <a href="#" class="login_social-icon">
                <i class="fab fa-linkedin-in"></i>
              </a>
            </div>
          </form>
          <form action="#" class="login_sign-up-form">
            <h2 class="login_title">Sign up</h2>
            <div class="login_input-field">
              <i class="fas fa-user"></i>
              <input
                id="login_signup-username"
                type="text"
                placeholder="Username"
                required
              />
            </div>
            <div class="login_input-field">
              <i class="fas fa-envelope"></i>
              <input
                id="login_signup-email"
                type="email"
                placeholder="Email"
                required
              />
            </div>
            <div class="login_input-field">
              <i class="fas fa-lock"></i>
              <input
                id="login_signup-password"
                type="password"
                placeholder="Password"
                required
              />
            </div>
            <input type="submit" class="login_btn" value="Sign up" />
            <p class="login_social-text">Or Sign up with social platforms</p>
            <div class="login_social-media">
              <a href="#" class="login_social-icon">
                <i class="fab fa-google"></i>
              </a>
              <a href="#" class="login_social-icon">
                <i class="fab fa-linkedin-in"></i>
              </a>
            </div>
          </form>
        </div>
      </div>

      <div class="login_panels-container">
        <div class="login_panel login_left-panel">
          <div class="login_content">
            <h3>New here ?</h3>
            <p>Sign up to our website</p>
            <button class="login_btn login_transparent" id="login_sign-up-btn">
              Sign UP
            </button>
          </div>
          <img src="img/log.svg" class="login_image" alt="" />
        </div>
        <div class="login_panel login_right-panel">
          <div class="login_content">
            <h3>One of us ?</h3>
            <p>Login to our websir</p>
            <button class="login_btn login_transparent" id="login_sign-in-btn">
              Login
            </button>
          </div>
          <img src="img/register.svg" class="login_image" alt="" />
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
